<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table | Luxe Dining</title>
    <style>
        /* --- LUXE DINING IMMERSIVE INTERACTIVE STYLESHEET --- */
        body {
            background: #030303;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* --- 1. LIVE GOLDEN PARTICLE MATRIX BACKGROUND --- */
        .luxe-bg-matrix {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            overflow: hidden;
            pointer-events: none; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #020202 100%);
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.6) 0%, transparent 80%);
            border-radius: 50%;
            bottom: -50px;
            transition: transform 0.5s ease;
            pointer-events: none; 
        }

        .p1 { width: 4px; height: 4px; left: 10%; animation: floatUp 12s linear infinite; }
        .p2 { width: 6px; height: 6px; left: 25%; animation: floatUp 18s linear infinite; }
        .p3 { width: 3px; height: 3px; left: 45%; animation: floatUp 15s linear infinite; }
        .p4 { width: 7px; height: 7px; left: 60%; animation: floatUp 22s linear infinite; }
        .p5 { width: 5px; height: 5px; left: 75%; animation: floatUp 14s linear infinite; }
        .p6 { width: 8px; height: 8px; left: 90%; animation: floatUp 25s linear infinite; }
        .p7 { width: 4px; height: 4px; left: 35%; animation: floatUp 16s linear infinite; }
        .p8 { width: 6px; height: 6px; left: 85%; animation: floatUp 20s linear infinite; }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
        }

        .luxe-bg-matrix.warp-speed .particle {
            animation: warpDrive 0.8s cubic-bezier(0.7, 0, 0.3, 1) infinite !important;
            background: linear-gradient(to top, rgba(212, 175, 55, 0.8), transparent);
            border-radius: 2px;
        }

        @keyframes warpDrive {
            0% { bottom: 100%; height: 10px; width: 2px; opacity: 1; }
            100% { bottom: -20%; height: 150px; width: 2px; opacity: 0; }
        }

        /* --- 2. CONTAINER CARD --- */
        .booking-container {
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
            z-index: 10; 
            position: relative;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .booking-container.submitted-state {
            transform: scale(0.9) translateY(-50px);
            opacity: 0;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
        }

        h2 { color: #d4af37; text-align: center; margin-top: 0; margin-bottom: 8px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; }
        p { text-align: center; color: #777; font-size: 13px; margin-bottom: 35px; letter-spacing: 0.8px; }
        form { display: flex; flex-direction: column; gap: 20px; }

        input {
            padding: 15px 18px;
            border-radius: 10px;
            border: 1px solid #1a1a1a;
            background: rgba(15, 15, 15, 0.9);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-sizing: border-box;
            width: 100%;
        }

        input:focus { 
            border-color: #d4af37; 
            background: #0f0f0f;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.12);
        }

        .row { display: flex; gap: 14px; }
        .row input { flex: 1; width: 50%; }

        button {
            background: linear-gradient(135deg, #d4af37 0%, #aa8421 100%);
            color: #000;
            padding: 18px;
            border: none;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        button:hover { 
            background: linear-gradient(135deg, #f1c40f 0%, #d4af37 100%);
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.35);
        }

        button:disabled { background: #222 !important; color: #555 !important; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .back-home { margin-top: 30px; color: #555; text-decoration: none; font-size: 13px; transition: all 0.3s ease; letter-spacing: 1.5px; z-index: 15; text-transform: uppercase; position: relative; }
        .back-home:hover { color: #d4af37; }
    </style>
</head>
<body>

    <div class="luxe-bg-matrix" id="bgMatrix">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
    </div>

    <div class="booking-container" id="formContainer">
        <h2>LUXE RESERVATION</h2>
        <p>Book your premium dining spot in Indore</p>

        <form id="bookingForm">
            <input type="text" id="customer_name" placeholder="Full Name" required autocomplete="name">
            <input type="tel" id="phone" placeholder="Phone Number (10 Digits)" pattern="[0-9]{10}" required autocomplete="tel">
            <input type="number" id="guests" placeholder="Number of Guests" min="1" max="20" required>
            
            <div class="row">
                <input type="date" id="date" required title="Select Date">
                <input type="time" id="time" required title="Select Time">
            </div>
            
            <button type="submit" id="submitBtn">CONFIRM BOOKING</button>
        </form>
    </div>

    <a href="index.html" class="back-home" id="backLink">← Back to Homepage</a>

    <script src="js/booking.js"></script>
</body>
</html>
